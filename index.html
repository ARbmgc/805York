<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="view-transition" content="same-origin">
<title>805york</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
  }

  .landing h1 {
    font-size: clamp(64px, 15vw, 200px);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0;
    line-height: 0.88;
    text-transform: lowercase;
    animation: rise 1.1s cubic-bezier(.22,1,.36,1) both;
  }

  .landing .tag {
    margin-top: 64px;
    font-size: 12px;
    letter-spacing: 0.42em;
    color: var(--muted);
    text-transform: lowercase;
    font-weight: 300;
    animation: rise 1.1s cubic-bezier(.22,1,.36,1) 0.15s both;
  }

  .landing .rule {
    margin-top: 30px;
    animation: rise 1.1s cubic-bezier(.22,1,.36,1) 0.3s both;
  }

  .footer {
    position: fixed;
    bottom: 26px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #9a9384;
    font-weight: 300;
    text-transform: lowercase;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  <nav class="site-nav">
    <span class="wordmark">805york</span>
    <div class="links">
      <a href="menu.html">menu</a>
      <a href="about.html">about</a>
    </div>
  </nav>

  <div class="landing">
    <h1>805york</h1>
    <p class="tag">jersey city &mdash; by reservation</p>
    <div class="rule"></div>
  </div>

  <p class="footer">est. 2026</p>

</body>
</html>
